<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    h1 {
      font-family: 'Segoe UI', sans-serif;
      font-size: 12rem;
      font-weight: 900;
      background: linear-gradient(90deg, #ff0080, #ff8c00, #ffe000, #00e676, #00b0ff, #d500f9);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shift 3s ease infinite;
    }

    @keyframes shift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>
  <h1>Hello</h1>
</body>
</html>
